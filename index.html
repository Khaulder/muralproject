    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    .video-wrap::before {
      content: "";
      display: block;
      padding-top: 56.25%;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .spacer {
      height: 16px;
    }

    .insta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
